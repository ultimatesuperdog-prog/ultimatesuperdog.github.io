<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>面妖写真集</title>

<style>
  body {
    margin: 0;
    padding: 0;
    background: #0a0a0f;
    color: #ddd;
    font-family: "Yu Gothic", sans-serif;
  }

  h1 {
    text-align: center;
    padding: 20px 0;
    font-size: 32px;
    letter-spacing: 4px;
    color: #cfcfcf;
    text-shadow: 0 0 10px #8800ff;
  }

  .gallery {
    width: 90%;
    max-width: 1200px;
    margin: 0 auto 50px auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .photo-box {
    position: relative;
    overflow: hidden;
    border: 2px solid #333;
    box-shadow: 0 0 15px rgba(120, 0, 255, 0.4);
    transition: 0.3s;
  }

  .photo-box:hover {
    transform: scale(1.03);
    box-shadow: 0 0 25px rgba(180, 0, 255, 0.7);
  }

  .photo-box img {
    width: 100%;
    height: auto;
    display: block;
    filter: brightness(70%) contrast(120%) saturate(130%);
    transition: 0.4s;
  }

  .photo-box:hover img {
    filter: brightness(100%) contrast(140%) saturate(150%);
  }

  .caption {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 8px 0;
    background: rgba(0, 0, 0, 0.6);
    color: #ccc;
    font-size: 14px;
    text-align: center;
    letter-spacing: 2px;
    opacity: 0;
    transition: 0.4s;
  }

  .photo-box:hover .caption {
    opacity: 1;
  }
</style>

</head>
<body>

<h1>面妖写真集</h1>

<div class="gallery" id="gallery"></div>

<script>
  const photos = [
    "https://github.com/ultimatesuperdog-prog/ultimatesuperdog.github.io/blob/main/photo/VRChat_2025-11-03_23-04-48.690_2560x1440.png?raw=true",
    "https://github.com/ultimatesuperdog-prog/ultimatesuperdog.github.io/blob/main/photo/VRChat_2025-11-25_08-31-24.950_1440x2560.png?raw=true",
    "https://github.com/ultimatesuperdog-prog/ultimatesuperdog.github.io/blob/main/photo/VRChat_2025-11-25_08-36-22.402_1440x2560.png?raw=true",
    "img/photo4.jpg",
    "img/photo5.jpg",
    "img/photo6.jpg",
    "img/photo7.jpg",
    "https://github.com/ultimatesuperdog-prog/ultimatesuperdog.github.io/blob/main/photo/VRChat_2026-01-02_21-30-58.401_1440x2560.png?raw=true",
    "https://github.com/ultimatesuperdog-prog/ultimatesuperdog.github.io/blob/main/photo/VRChat_2026-01-04_09-59-13.803_2560x1440.png?raw=true",
    "https://github.com/ultimatesuperdog-prog/ultimatesuperdog.github.io/blob/main/photo/VRChat_2026-01-09_06-52-16.327_2560x1440.png?raw=true"
  ];

  const gallery = document.getElementById("gallery");

  photos.forEach((url, i) => {
    const box = document.createElement("div");
    box.className = "photo-box";

    box.innerHTML = `
      <img src="${url}">
      <div class="caption">Photo ${i + 1}</div>
    `;

    gallery.appendChild(box);
  });
</script>

</body>
</html>
